name: Deploy ZComputer to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/zcomputer
            git pull origin main
            
            # Cố gắng tăng limit Nginx (Sẽ tự động bỏ qua nếu không có quyền root)
            sudo sh -c 'echo "client_max_body_size 100M;" > /etc/nginx/conf.d/upload_limit.conf' || true
            sudo systemctl reload nginx || true
            
            echo "Deploying Backend..."
            cd be
            npm install
            pm2 restart zcomputer-backend || pm2 start npm --name "zcomputer-backend" -- run start
            
            echo "Deploying Frontend..."
            cd ../fe
            npm install
            npm run build
            pm2 restart zcomputer-frontend || pm2 start npm --name "zcomputer-frontend" -- run start
            
            echo "Deployment Completed Successfully!"

